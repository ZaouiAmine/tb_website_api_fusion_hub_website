<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API Fusion Hub</title>
  <meta name="description" content="One control plane for API performance, reliability, and endpoint health.">
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">API observability</p>
      <h1>API Fusion Hub</h1>
      <p class="lead">Monitor traffic, latency, and failures across every connected service.</p>
    </header>
    <section class="kpi-grid" aria-label="Key metrics">
      <article class="card">
        <h2>Requests today</h2>
        <p class="value">9.2M</p>
      </article>
      <article class="card">
        <h2>P95 latency</h2>
        <p class="value">128 ms</p>
      </article>
      <article class="card">
        <h2>Error rate</h2>
        <p class="value">0.24%</p>
      </article>
      <article class="card">
        <h2>Active endpoints</h2>
        <p class="value">186</p>
      </article>
    </section>
  </main>
  <script src="assets/shell.js"></script>
</body>
</html>
